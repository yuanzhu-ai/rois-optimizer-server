server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  cors:
    # 生产环境应配置为具体域名列表，如 ["https://your-domain.com"]
    allow_origins:
      - "*"
    allow_methods:
      - "GET"
      - "POST"
    allow_headers:
      - "X-Airline"
      - "X-API-Key"
      - "Authorization"
      - "Content-Type"

auth:
  enabled: true  # 启用认证

  # JWT 认证 (推荐 — 复用 Live Server 签发的 JWT)
  jwt:
    enabled: true
    # 与 Live Server 共享的 JWT 签名密钥
    secret: "${JWT_SECRET}"
    algorithm: "HS256"
    verify_exp: true  # 是否校验过期时间

  # API Key 认证 (面向 Live Server 等服务间调用)
  api_key:
    enabled: true
    key: "${ROIS_API_KEY:your_api_key_here}"

  # 静态 Bearer Token 认证 (向后兼容)
  bearer_token:
    enabled: false
    token: "${ROIS_BEARER_TOKEN:your_bearer_token_here}"

  # 航司特定认证 (可选)
  airline_auth:
    BR:
      api_key: ""
      bearer_token: ""
    F8:
      api_key: ""
      bearer_token: ""

  # 请求限流 (按 airline 维度)
  rate_limit:
    enabled: true
    rate: "15/minute"  # 每航司每分钟最多 15 个请求

paths:
  working_dir: "./workspace"
  finished_dir: "./finished"
  archive_dir: "./archive"
  temp_dir: "./temp"

file_management:
  archive_days: 1
  cleanup_days: 30

tasks:
  max_concurrent: 10
  timeout: 3600

# HTTP客户端配置
http_client:
  # Live Server请求超时时间（秒）
  # 注：input.gz生成可能需要1-3分钟，当请求localhost时可能需要更长时间
  # 建议设置20分钟（1200秒）以确保有足够时间处理
  timeout: 1200

redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: null
  db: 0
  task_ttl: 3600

airlines:
  BR:
    optimizers:
      PO:
        name: "Pairing Optimizer"
        linux:
          path: "./BR/po.sh"
        windows:
          path: "./BR/po.bat"
        url:
          input: "/api/orengine/po/comptxt"
          output: "/api/orengine/po/solution"
        server_integration: true
      RO:
        name: "Roster Optimizer"
        linux:
          path: "./BR/ro.sh"
        windows:
          path: "./BR/ro.bat"
        url:
          input: "/api/orengine/ro/comptxt"
          output: "/api/orengine/ro/solution"
        server_integration: true
      TO:
        name: "Training Optimizer"
        linux:
          path: "./BR/to.sh"
        windows:
          path: "./BR/to.bat"
        url:
          input: "/api/orengine/to/comptxt"
          output: "/api/orengine/to/solution"
        server_integration: true
      Rule:
        categories:
          change_flight:
            name: "Change Flight Rule"
            linux:
              path: "./BR/rule_change_flight.sh"
            windows:
              path: "./BR/rule_change_flight.bat"
            url:
              input: "/api/orengine/byFlight/comptxt"
              output: "/api/orengine/byFlight/save/csv"
          manday:
            name: "Manday Rule"
            linux:
              path: "./BR/rule_manday.sh"
            windows:
              path: "./BR/rule_manday.bat"
            url:
              input: "/api/orengine/ro/partial/comptxt"
              output: "/api/crewMandayFd/partlySave/csv/comp"
          manday_byCrew:
            name: "Manday by Crew Rule"
            linux:
              path: "./BR/rule_manday_byCrew.sh"
            windows:
              path: "./BR/rule_manday_byCrew.bat"
            url:
              input: "/api/orengine/byCrew/comptxt"
              output: "/api/crewMandayFd/partlySave/csv/comp"
        server_integration: true
  F8:
    optimizers:
      PO:
        name: "Pairing Optimizer"
        linux:
          path: "./F8/po.sh"
        windows:
          path: "./F8/po.bat"
        url:
          input: "/api/orengine/po/comptxt"
          output: "/api/orengine/po/solution"
        server_integration: true
      RO:
        name: "Roster Optimizer"
        linux:
          path: "./F8/ro.sh"
        windows:
          path: "./F8/ro.bat"
        url:
          input: "/api/orengine/ro/comptxt"
          output: "/api/orengine/ro/solution"
        server_integration: true
      TO:
        name: "Training Optimizer"
        linux:
          path: "./F8/to.sh"
        windows:
          path: "./F8/to.bat"
        url:
          input: "/api/orengine/to/comptxt"
          output: "/api/orengine/to/solution"
        server_integration: true
      Rule:
        categories:
          change_flight:
            name: "Change Flight Rule"
            linux:
              path: "./F8/rule_change_flight.sh"
            windows:
              path: "./F8/rule_change_flight.bat"
            url:
              input: "/api/orengine/byFlight/comptxt"
              output: "/api/orengine/byFlight/save/csv"
          manday:
            name: "Manday Rule"
            linux:
              path: "./F8/rule_manday.sh"
            windows:
              path: "./F8/rule_manday.bat"
            url:
              input: "/api/orengine/ro/partial/comptxt"
              output: "/api/crewMandayFd/partlySave/csv/comp"
          manday_byCrew:
            name: "Manday by Crew Rule"
            linux:
              path: "./F8/rule_manday_byCrew.sh"
            windows:
              path: "./F8/rule_manday_byCrew.bat"
            url:
              input: "/api/orengine/byCrew/comptxt"
              output: "/api/crewMandayFd/partlySave/csv/comp"
        server_integration: true
